<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunny Shore Co</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #f0f0f0;
        }
        .sun {
            width: 100px;
            height: 100px;
            background: yellow;
            border-radius: 50%;
            position: relative;
            margin: 20px auto;
        }
        /* Media queries for responsive sizing */
        @media (max-width: 768px) {
            .sun {
                width: 80px;
                height: 80px;
            }
        }
        @media (max-width: 480px) {
            .sun {
                width: 60px;
                height: 60px;
            }
        }
    </style>
</head>
<body>
    <h1>Welcome to Sunny Shore Co!</h1>
    <div class="sun"></div>
    <p>Enjoy your time by the shore!</p>
</body>
</html>
